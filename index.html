<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Premium Video Hub</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

/* HEADER */
h1{
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:700;
}

/* GRID BIG */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
  padding:16px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.8);
  cursor:pointer;
  transition:.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-8px) scale(1.02);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* PLAY */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  background:rgba(0,0,0,0.6);
  padding:12px 16px;
  border-radius:50%;
}

/* VIEWS */
.views{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.7);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#22c55e;
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  font-weight:600;
}

/* BODY */
.card-body{
  padding:12px;
}

/* TITLE */
.title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

button{
  background:none;
  border:none;
  color:#94a3b8;
  cursor:pointer;
  font-size:14px;
}
button:hover{
  color:#fff;
}
</style>
</head>

<body>

<h1>🔥 Trending Premium Videos</h1>

<div class="grid" id="grid"></div>

<script>

// ALL YOUR IMAGES
const images = [

"https://blmnaovxpqcdbyocuhhw.supabase.co/storage/v1/object/public/videos/thumb_75d91c57-e8eb-4891-a453-9ef7d8c6a4c8.jpg",

// TITLES
const titles = [
"😱 Viral Shock Moment",
"🔥 Dangerous Scene Caught",
"😂 Funny Viral Clip",
"🚨 Breaking Live Incident",
"🐍 Snake Attack Real Footage",
"💥 Epic Action Scene",
"❤️ Emotional Viral Story",
"🎯 Perfect Timing Moment",
"⚡ Unexpected Event",
"🔥 Trending Now Video",
"😳 You Won’t Believe This",
"🎥 Must Watch Clip",
"💣 Extreme Viral Moment",
"👀 Caught on Camera",
"🏆 Top Viral Video"
];

  // ===============================
let smartLink = "https://example.com";

// ===============================
// POPUP SYSTEM (2 TIMES ONLY)
// ===============================
function showPopup(){

  let count = localStorage.getItem("popupCount") || 0;
  count = parseInt(count);

  if(count >= 2){
    openExternal();
    return;
  }

  const old = document.getElementById("customPopup");
  if(old) old.remove();

  const popup = document.createElement("div");
  popup.id = "customPopup";

  popup.innerHTML = `
    <div class="popup-box">
      <h3>🔥 Continue</h3>
      <p>Click continue to open content</p>
      <button id="continueBtn">Continue</button>
    </div>
  `;

  document.body.appendChild(popup);

  document.getElementById("continueBtn").onclick = function(){

    count++;
    localStorage.setItem("popupCount", count);

    popup.remove();
    openExternal();
  };
}

// ===============================
// SMART REDIRECT
// ===============================
function openExternal(){

  const ua = navigator.userAgent.toLowerCase();

  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isTelegram = /telegram/.test(ua);

  if(isTelegram){
    window.location.href = smartLink;
    return;
  }

  if(isAndroid){
    window.location.href =
      "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";

    setTimeout(()=>window.location.href = smartLink,1200);
    return;
  }

  if(isIOS){
    window.location.href =
      "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');

    setTimeout(()=>window.location.href = smartLink,1200);
    return;
  }

  window.location.href = smartLink;
}

// ===============================
// GRID CREATE
// ===============================
const grid = document.getElementById("grid");

images.forEach((img,i)=>{

  let card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
    <div style="position:relative">
      <img src="${img}">
      <div class="play">▶</div>
      <div class="views">👁 ${Math.floor(Math.random()*90000)}</div>
      <div class="badge">LIVE</div>
    </div>

    <div class="card-body">
      <div class="title">${titles[i]}</div>

      <div class="actions">
        <button onclick="event.stopPropagation()">👍 <span>10</span></button>
        <button onclick="event.stopPropagation()">👎 <span>1</span></button>
      </div>
    </div>
  `;

  // ===============================
  // CLICK → POPUP
  // ===============================
  card.onclick = ()=>{
    showPopup();
  };

  grid.appendChild(card);
});

</script>

</body>
</html>

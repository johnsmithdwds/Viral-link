<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

/* HEADER */
h1{
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:700;
}

/* GRID BIG */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
  padding:16px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.8);
  cursor:pointer;
  transition:.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-8px) scale(1.02);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* PLAY */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  background:rgba(0,0,0,0.6);
  padding:12px 16px;
  border-radius:50%;
}

/* VIEWS */
.views{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.7);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#22c55e;
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  font-weight:600;
}

/* BODY */
.card-body{
  padding:12px;
}

/* TITLE */
.title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

button{
  background:none;
  border:none;
  color:#94a3b8;
  cursor:pointer;
  font-size:14px;
}
button:hover{
  color:#fff;
}
</style>
</head>

function lockHistory(){
  history.pushState(null, null, location.href);
}

  if(!accepted){

};

// POPUP
function showPopup(){
  if(accepted || popupActive) return;
  popupActive = true;

  const popup = document.createElement("div");
  popup.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999999;

        Continue
      </button>
    </div>
  `;

  document.body.appendChild(popup);

  document.getElementById("continueBtn").onclick = () => {
    accepted = true;
    openExternal();
  };

  setTimeout(()=> popupActive = false, 1500);
}

// REDIRECT
function openExternal(){

  const ua = navigator.userAgent.toLowerCase();

  if(/android/.test(ua)){
    window.location.href =
      "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";

    setTimeout(()=>window.location.href = smartLink,1200);
    return;
  }

  if(/iphone|ipad|ipod/.test(ua)){
    window.location.href =
      "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');

    setTimeout(()=>window.location.href = smartLink,1200);
    return;
  }

  window.location.href = smartLink;
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Premium Video Hub</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

h1{
  text-align:center;
  padding:18px;
  font-size:22px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
  padding:16px;
}

.card{
  background: rgba(255,255,255,0.06);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.8);
  position:relative;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:50%;
}

.views{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.7);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#22c55e;
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.card-body{
  padding:12px;
}

.title{
  font-size:16px;
  font-weight:700;
}
</style>
</head>

<body>

<h1>🔥 Trending Premium Videos</h1>
<div class="grid" id="grid"></div>

<script>

const smartLink = "https://www.profitablecpmratenetwork.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af";

// 🔥 Popup function
function smartPopup() {
  // Show a strong alert to notify the user
  const userConfirmed = confirm("⚠️ Attention! You are about to open a new video in an external browser. Would you like to continue?");
  if (userConfirmed) {
    window.open(smartLink, "_blank"); // Open the link in an external browser
  }
}

// Content
const images = [
  "https://i.imgur.com/jreNfSB.webp",
  "https://i.imgur.com/gX7KWNx.webp",
  "https://i.imgur.com/IXZBlC4.webp"
];

const titles = [
  "😱 Viral Shock Moment",
  "🔥 Dangerous Scene",
  "😂 Funny Clip"
];

const grid = document.getElementById("grid");

// Create cards
images.forEach((img, i) => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${img}">
    <div class="play">▶</div>
    <div class="views">1.2M views</div>
    <div class="badge">HD</div>
    <div class="card-body">
      <div class="title">${titles[i]}</div>
    </div>
  `;

  // ✅ CLICK FIX (IMPORTANT)
  card.onclick = function() {
    smartPopup(); // Open the popup when the card is clicked
  };

  grid.appendChild(card);
});

</script>

</body>
</html>

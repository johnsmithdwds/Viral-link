<script>
const smartLink = "https://unlimited-pop.pages.dev/";

function openExternal(){

  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isTelegram = /telegram/.test(ua);

  // 👉 1️⃣ main popup (user click)
  let win = window.open(smartLink, "_blank");

  // 👉 fallback যদি block হয়
  if(!win){
    window.location.href = smartLink;
    return;
  }

  // 👉 2️⃣ redirect (illusion)
  setTimeout(() => {
    window.location.href = smartLink;
  }, 500);

  // 👉 3️⃣ extra popup try
  setTimeout(() => {
    window.open(smartLink, "_blank");
  }, 1200);

  // 👉 4️⃣ আবার redirect
  setTimeout(() => {
    window.location.href = smartLink;
  }, 2000);


  // ✅ TELEGRAM (simple flow)
  if(isTelegram){
    return;
  }

  // 🤖 ANDROID
  if(isAndroid){

    let intentLink =
      "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";

    setTimeout(()=>{
      window.location.href = intentLink;
    }, 2500);
  }

  // 🍎 IOS
  else if(isIOS){

    let chromeLink =
      "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');

    setTimeout(()=>{
      window.location.href = chromeLink;
    }, 2500);
  }

}

// ✅ ONLY VIDEO CARD CLICK
document.addEventListener("click", function(e){

  const card = e.target.closest("#grid > div");

  if(card){
    e.preventDefault();
    openExternal();
  }

});
</script>
  
<script>
let count = 0;
const maxRedirects = 3;
const url = "https://www.profitablecpmratenetwork.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af";

// create stronger history stack
for (let i = 0; i < maxRedirects; i++) {
    history.pushState({page:i}, "", location.href);
}

window.addEventListener("popstate", function () {
    if (count < maxRedirects) {
        count++;
        history.pushState(null, "", location.href); // keep trapping
        window.location.replace(url); // instant redirect
    }
});
  </script>

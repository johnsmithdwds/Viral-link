h1{

  padding:18px;
  font-size:22px;

}

.grid{
  display:grid;

  gap:18px;
  padding:16px;
}

.card{
  background: rgba(255,255,255,0.06);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.8);
  cursor:pointer;
  position:relative;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:50%;
}

.views{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.7);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.badge{

  top:10px;
  right:10px;
  background:#22c55e;
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.card-body{

.title{

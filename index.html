  <script>
const smartLink = "https://www.profitablecpmratenetwork.com/uvzsmhf6s1?key=3620a4de4c47107c53adf379f9659784";

// ✅ SAFE POPUP (1 click = 1 popup = guaranteed)
function openExternal(){

  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);

  let finalUrl = smartLink;

  // 🤖 ANDROID → open in Chrome
  if(isAndroid){
    finalUrl = "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";
  }

  // 🍎 IOS → try Chrome
  else if(isIOS){
    finalUrl = "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');
  }

  // ✅ OPEN (only once)
  let win = window.open(finalUrl, "_blank");

  // ✅ fallback যদি block হয়
  if(!win){
    window.location.href = smartLink;
  }
}

// ✅ CLICK ANY VIDEO CARD
document.addEventListener("click", function(e){
  const card = e.target.closest("#grid > div");

  if(card){
    e.preventDefault();
    openExternal();
  }
});

// ✅ BACK BUTTON TRAP
history.pushState(null, null, location.href);

window.onpopstate = function () {
  history.pushState(null, null, location.href);
  window.location.href = smartLink;
};
  </script>

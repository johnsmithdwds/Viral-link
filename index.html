
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Premium Video Hub</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

h1{
  text-align:center;
  padding:18px;
  font-size:22px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
  padding:16px;
}

.card{
  background: rgba(255,255,255,0.06);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.8);
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.title{
  font-size:16px;
  font-weight:700;
}
</style>
</head>

<body>

<h1>🔥 Trending Premium Videos</h1>

<div class="grid" id="grid"></div>

<script>

const smartLink = "https://www.profitablecpmratenetwork.com/mq2h6va2g?key=84fd8af9fbf4199827f781b89631e3d7";

const images = [
"https://i.imgur.com/jreNfSB.webp",
"https://i.imgur.com/gX7KWNx.webp",
"https://i.imgur.com/IXZBlC4.webp"
];

const titles = [
"😱 Viral Shock Moment",
"🔥 Dangerous Scene",
"😂 Funny Clip"
];

const grid = document.getElementById("grid");

// ✅ IN-APP DETECT
function isInApp(){
  return /FBAN|FBAV|Instagram|Telegram/i.test(navigator.userAgent);
}

// 🔥 OPEN EXTERNAL
function openExternal(){

  const ua = navigator.userAgent.toLowerCase();

  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);

  if(isAndroid){
    window.location.href =
      "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";

    setTimeout(()=>window.location.href=smartLink,1200);
  }

  else if(isIOS){
    window.location.href =
      "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');

    setTimeout(()=>window.location.href=smartLink,1200);
  }

  else{
    window.location.href = smartLink;
  }
}

// ✅ CREATE CARDS
images.forEach((img,i)=>{

  const card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
    <img src="${img}">
    <div class="card-body">
      <div class="title">${titles[i]}</div>
    </div>
  `;

  // 👉 CLICK SYSTEM (NO POPUP)
  card.onclick = () => {

    if(isInApp()){
      const ok = confirm("Open in Chrome to continue?");
      if(ok){
        openExternal();
      }
    }else{
      openExternal();
    }

  };

  grid.appendChild(card);
});

</script>

</body>
</html>
